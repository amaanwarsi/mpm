    <!-- FEATURES -->
    <section class="features-section" id="features">
        <div class="section-container">
            <div class="fade-in">
                <p class="section-label">Why MPM</p>
                <h2 class="section-title">Stop downloading<br>what you don't need.</h2>
                <p class="section-subtitle">MPM resolves packages from the npm registry, extracts tarballs, intelligently ranks files, and copies only the best candidates.</p>
            </div>
            <div class="features-grid">
                <div class="feature-card" data-delay="0">
                    <div class="feature-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
                    </div>
                    <h3>Saves Disk Space</h3>
                    <p>No node_modules bloat. MPM downloads only the tarball, extracts temporarily, and copies the final assets you actually need.</p>
                </div>
                <div class="feature-card" data-delay="100">
                    <div class="feature-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    </div>
                    <h3>Fast</h3>
                    <p>Built on top of npm for speed. Downloads only the tarball, extracts temporarily, and copies what matters in seconds.</p>
                </div>
                <div class="feature-card" data-delay="200">
                    <div class="feature-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    </div>
                    <h3>Low Risk</h3>
                    <p>Doesn't execute any package code. Never runs postinstall scripts. Just static file extraction and copying.</p>
                </div>
                <div class="feature-card" data-delay="300">
                    <div class="feature-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                    </div>
                    <h3>Smart Ranking</h3>
                    <p>Automatically picks the most likely asset—minified, inside /dist, matching package name, reasonable size. Scored and ranked.</p>
                </div>
                <div class="feature-card" data-delay="400">
                    <div class="feature-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
                    </div>
                    <h3>GitHub Fallback</h3>
                    <p>If npm fails, MPM scans GitHub repositories for the same asset patterns. You always get your file, one way or another.</p>
                </div>
                <div class="feature-card" data-delay="500">
                    <div class="feature-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                    </div>
                    <h3>Tracks Everything</h3>
                    <p>Updates your package.json under an "assets" section for full reproducibility. Update all assets with a single command.</p>
                </div>
            </div>
        </div>
    </section>

    <!-- HOW IT WORKS -->
    <section class="how-section" id="how">
        <div class="section-container">
            <div class="fade-in">
                <p class="section-label">Ranking Engine</p>
                <h2 class="section-title">How MPM finds<br>the right file.</h2>
            </div>
            <div class="how-grid">
                <div class="how-visual">
                    <div class="ranking-display" id="rankingDisplay">
                        <div class="ranking-item best" data-score="100">
                            <span class="ranking-file">dist/lodash.min.js</span>
                            <div class="ranking-bar"><div class="ranking-bar-fill" style="width: 0%" data-width="100%"></div></div>
                            <span class="ranking-score">31</span>
                        </div>
                        <div class="ranking-item" data-score="70">
                            <span class="ranking-file">dist/lodash.js</span>
                            <div class="ranking-bar"><div class="ranking-bar-fill" style="width: 0%" data-width="70%"></div></div>
                            <span class="ranking-score">21</span>
                        </div>
                        <div class="ranking-item" data-score="45">
                            <span class="ranking-file">lib/lodash.min.js</span>
                            <div class="ranking-bar"><div class="ranking-bar-fill" style="width: 0%" data-width="45%"></div></div>
                            <span class="ranking-score">15</span>
                        </div>
                        <div class="ranking-item" data-score="20">
                            <span class="ranking-file">src/lodash.js</span>
                            <div class="ranking-bar"><div class="ranking-bar-fill" style="width: 0%" data-width="20%"></div></div>
                            <span class="ranking-score">5</span>
                        </div>
                        <div class="ranking-item" data-score="5">
                            <span class="ranking-file">test/lodash.spec.js</span>
                            <div class="ranking-bar"><div class="ranking-bar-fill" style="width: 0%" data-width="5%"></div></div>
                            <span class="ranking-score">-15</span>
                        </div>
                    </div>
                </div>
                <div class="how-steps">
                    <div class="how-step" data-delay="0">
                        <div class="step-number">1</div>
                        <div class="step-content">
                            <h4>Resolve & Download</h4>
                            <p>MPM resolves the package from the npm registry and downloads the tarball to a temporary folder.</p>
                        </div>
                    </div>
                    <div class="how-step" data-delay="150">
                        <div class="step-number">2</div>
                        <div class="step-content">
                            <h4>Scan & Score</h4>
                            <p>Each candidate file receives a score based on positive signals (.min.js, /dist, name match) and negative signals (/src, test files, too small).</p>
                        </div>
                    </div>
                    <div class="how-step" data-delay="300">
                        <div class="step-number">3</div>
                        <div class="step-content">
                            <h4>Tie-Breaker</h4>
                            <p>When scores match, MPM prioritizes: exact name match → index/main → shortest folder depth.</p>
                        </div>
                    </div>
                    <div class="how-step" data-delay="450">
                        <div class="step-number">4</div>
                        <div class="step-content">
                            <h4>Copy & Track</h4>
                            <p>The highest-scoring file is copied to your output directory and tracked in package.json for reproducibility.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- COMMANDS -->
    <section class="commands-section" id="commands">
        <div class="section-container">
            <div class="fade-in">
                <p class="section-label">Commands</p>
                <h2 class="section-title">Simple by design.</h2>
                <p class="section-subtitle">Three commands. That's all you need to manage your project's assets.</p>
            </div>
            <div class="commands-grid">
                <div class="command-card" data-delay="0">
                    <div class="command-name">mpm get &lt;pkg&gt;</div>
                    <p class="command-desc">Fetch assets for a specific package. Supports <code>--js</code>, <code>--css</code>, <code>--version</code>, and <code>--out</code> flags.</p>
                </div>
                <div class="command-card" data-delay="100">
                    <div class="command-name">mpm update &lt;pkg&gt;</div>
                    <p class="command-desc">Update specific package assets defined in package.json. Re-fetches and replaces output files with the latest version.</p>
                </div>
                <div class="command-card" data-delay="200">
                    <div class="command-name">mpm delete &lt;pkg&gt;</div>
                    <p class="command-desc">Remove asset entries and delete the corresponding files from disk. Clean removal, no traces left behind.</p>
                </div>
                <div class="command-card" data-delay="300">
                    <div class="command-name">mpm get --all</div>
                    <p class="command-desc">Process all packages listed in the package.json → assets section. Perfect for bootstrapping a project.</p>
                </div>
            </div>

            <!-- FLAGS -->
            <div class="fade-in" style="margin-top: 5rem;">
                <h3 class="section-title" style="font-size: 2rem;">Flags</h3>
            </div>
            <div class="flags-table">
                <div class="flag-row" data-delay="0">
                    <div class="flag-name">--js</div>
                    <div class="flag-desc">Only download JavaScript assets. Prefers minified versions.</div>
                </div>
                <div class="flag-row" data-delay="50">
                    <div class="flag-name">--css</div>
                    <div class="flag-desc">Only download CSS assets.</div>
                </div>
                <div class="flag-row" data-delay="100">
                    <div class="flag-name">--all</div>
                    <div class="flag-desc">Process all packages listed in package.json → assets section.</div>
                </div>
                <div class="flag-row" data-delay="150">
                    <div class="flag-name">--out &lt;path&gt;</div>
                    <div class="flag-desc">Custom output folder. Default: asset_modules/.</div>
                </div>
                <div class="flag-row" data-delay="200">
                    <div class="flag-name">--version &lt;ver&gt;</div>
                    <div class="flag-desc">Specify a package version. Example: <code>mpm get lodash --version 4.17.21</code></div>
                </div>
                <div class="flag-row" data-delay="250">
                    <div class="flag-name">--force</div>
                    <div class="flag-desc">Skip cache, re-download and re-extract the tarball.</div>
                </div>
            </div>
        </div>
    </section>

    <!-- INTEGRATION -->
    <section class="integration-section" id="integration">
        <div class="section-container">
            <div class="fade-in">
                <p class="section-label">Integration</p>
                <h2 class="section-title">Tracked in your<br>package.json.</h2>
                <p class="section-subtitle">MPM writes an "assets" object for full reproducibility and easy updates.</p>
            </div>
            <div class="integration-grid">
                <div class="code-example">
                    <div class="code-header">
                        <span class="code-filename">package.json</span>
                        <button class="copy-btn" onclick="copyJSON(this)" aria-label="Copy JSON">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                        </button>
                    </div>
                    <div class="code-body" id="jsonCode">
                        <span class="bracket">{</span><br>
                        &nbsp;&nbsp;<span class="key">"name"</span>: <span class="string">"my-project"</span>,<br>
                        &nbsp;&nbsp;<span class="comment">// ... other fields</span><br>
                        &nbsp;&nbsp;<span class="key">"assets"</span>: <span class="bracket">{</span><br>
                        &nbsp;&nbsp;&nbsp;&nbsp;<span class="key">"preline"</span>: <span class="bracket">{</span><br>
                        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="key">"version"</span>: <span class="string">"2.0.1"</span>,<br>
                        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="key">"files"</span>: <span class="bracket">[</span><span class="string">"dist/preline.min.js"</span><span class="bracket">]</span>,<br>
                        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="key">"type"</span>: <span class="string">"js"</span>,<br>
                        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="key">"out"</span>: <span class="string">"assets/ui.js"</span><br>
                        &nbsp;&nbsp;&nbsp;&nbsp;<span class="bracket">}</span>,<br>
                        &nbsp;&nbsp;&nbsp;&nbsp;<span class="key">"bootstrap"</span>: <span class="bracket">{</span><br>
                        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="key">"version"</span>: <span class="string">"5.3.0"</span>,<br>
                        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="key">"files"</span>: <span class="bracket">[</span><span class="string">"dist/css/bootstrap.min.css"</span><span class="bracket">]</span>,<br>
                        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="key">"type"</span>: <span class="string">"css"</span>,<br>
                        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="key">"out"</span>: <span class="string">"assets/bootstrap.css"</span><br>
                        &nbsp;&nbsp;&nbsp;&nbsp;<span class="bracket">}</span><br>
                        &nbsp;&nbsp;<span class="bracket">}</span><br>
                        <span class="bracket">}</span>
                    </div>
                </div>
                <div class="integration-info">
                    <div class="integration-item" data-delay="0">
                        <h4>files</h4>
                        <p>The exact file(s) that were selected from the package. Can be overridden manually in package.json.</p>
                    </div>
                    <div class="integration-item" data-delay="100">
                        <h4>type</h4>
                        <p>Either <code>"js"</code> or <code>"css"</code>. Determines how the asset is categorized and filtered.</p>
                    </div>
                    <div class="integration-item" data-delay="200">
                        <h4>out</h4>
                        <p>Where the file was copied, relative to the project root. MPM uses this path when updating assets.</p>
                    </div>
                    <div class="integration-item" data-delay="300">
                        <h4>update command</h4>
                        <p>Running <code>mpm update</code> re-fetches each package and replaces the output file with the newly selected asset.</p>
                    </div>
                </div>
            </div>

            <!-- WARNING -->
            <div class="warning-banner fade-in">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                <p><strong>Important:</strong> MPM is designed for <strong>standalone, bundled assets</strong> (UMD, IIFE, pre-compiled CSS) meant for direct browser use. ES Module or CommonJS files with internal imports will break—MPM intentionally does not download the node_modules tree.</p>
            </div>
        </div>
    </section>

    <!-- GITHUB FALLBACK -->

                    <span>Rank Files</span>
                </div>
                <span class="flow-arrow">→</span>
                <div class="flow-item" data-delay="300">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    <span>Download Raw</span>

    <!-- CTA -->

                    npm install -g @amaanwarsi/mpm
